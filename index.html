<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>IGA Milk Manager</title>
  </head>
  <body>
    <noscript><p style="padding:2rem;text-align:center;font-family:system-ui">JavaScript is required to run this app.</p></noscript>
    <div id="root"></div>
    <script>
      // ── Error display: show crashes on screen instead of blank white ──
      window.onerror = function(msg, src, line, col, err) {
        var r = document.getElementById('root');
        if (r && !r.children.length) {
          r.innerHTML = '<div style="padding:1.5rem;font-family:system-ui;font-size:14px">'
            + '<p style="color:#dc2626;font-weight:600">App failed to load</p>'
            + '<p style="color:#666;margin-top:8px;word-break:break-all">' + msg + '</p>'
            + '<p style="color:#999;margin-top:4px;font-size:12px">' + (src||'') + ':' + (line||'') + '</p>'
            + '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px">Reload</button>'
            + '</div>';
        }
      };
      window.onunhandledrejection = function(e) {
        var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Promise rejected';
        window.onerror(msg, '', 0, 0, e.reason);
      };

      // ── Escape hatch: if app hasn't rendered after 5s, nuke stale SW ──
      setTimeout(function() {
        var r = document.getElementById('root');
        if (r && !r.children.length && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length) {
              regs.forEach(function(reg) { reg.unregister(); });
              location.reload();
            }
          });
        }
      }, 5000);

      // ── Polyfills for older Safari (≤15.3) ──
      if (!Array.prototype.at) {
        Array.prototype.at = function(n) { n = Math.trunc(n) || 0; if (n < 0) n += this.length; return this[n]; };
        String.prototype.at = function(n) { n = Math.trunc(n) || 0; if (n < 0) n += this.length; return this[n]; };
      }
      if (!Object.hasOwn) {
        Object.hasOwn = function(o, p) { return Object.prototype.hasOwnProperty.call(o, p); };
      }
      if (typeof structuredClone === 'undefined') {
        window.structuredClone = function(v) { return JSON.parse(JSON.stringify(v)); };
      }
      if (!crypto.randomUUID) {
        crypto.randomUUID = function() {
          return '10000000-1000-4000-8000-100000000000'.replace(/[018]/g, function(c) {
            return (+c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> +c / 4).toString(16);
          });
        };
      }
      if (!AbortSignal.timeout) {
        AbortSignal.timeout = function(ms) {
          var c = new AbortController(); setTimeout(function() { c.abort(new DOMException('TimeoutError','TimeoutError')); }, ms); return c.signal;
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
